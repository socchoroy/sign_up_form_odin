<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin project</title>
    <style>
      body {
        margin: 0;
        font-family: Norse, sans-serif;
      }
      @font-face {
        font-family: "Norse";
        src: url(assets/fonts/Norse.otf) format("opentype");
        font-weight: normal;
      }
      @font-face {
        font-family: "Norse";
        src: url(assets/fonts/Norse-Bold.otf) format("opentype");
        font-weight: bold;
      }
      .container {
        display: flex;
        height: 100vh;
        width: 100%;
      }
      .image-section {
        flex: 0 0 40%;
        position: relative;
        background-size: cover;
        background-repeat: no-repeat;
        align-items: center;
        justify-content: center;
        /* overflow: hidden; */
      }
      .image-section img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .logo-container {
        display: flex;
        flex-direction: row;
        align-items: center;
        position: absolute;
        top: 35%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }
      .logo-container h1 {
        margin-left: 20px;
        font-size: 100px;
        color: white;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        font-family: "Norse", sans-serif;
        font-weight: normal;
      }
      .logo-container img {
        width: 150px;
        height: auto;
      }
      .footer-copyright {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        text-align: center;
      }
      .login-section {
        flex: 0 0 60%;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        background-color: #f5f5f5;
        padding: 2rem 0;
      }
      .login-box {
        padding-top: 75px;
      }
      .login-info {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 2rem;
        background-color: #e9edf1;
        padding: 2rem;
        width: 100%;
      }
      .login-info p {
        font-size: 1.25rem;
        font-weight: bold;
        margin-bottom: 1.5rem;
        color: #333;
      }
      .login-info form {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        width: 100%;
        max-width: 700px;
      }
      .login-info input {
        flex: 1 1 calc(50% - 0.5rem);
        padding: 0.75rem;
        font-size: 1rem;
        border: 2px solid #ddd;
        border-radius: 4px;
        font-family: inherit;
        box-sizing: border-box;
        transition:
          border-color 0.3s ease-out,
          background-color 0.3s ease-out;
      }
      .login-info input:focus {
        border-color: #fff;
        background-color: #fff;
        outline: none;
      }
      .login-info input::placeholder {
        color: #999;
        text-transform: uppercase;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .login-header {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        gap: 1rem;
        background-color: #f9f9f9;
        padding: 2rem;
        width: 100%;
        font-weight: bold;
        font-family: "Inter", "Roboto", "Open Sans", sans-serif;
      }
      .login-footer {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        background-color: #f9f9f9;
        padding: 2rem;
        width: 100%;
        align-items: flex-start;
      }
      button {
        font-size: 2rem;
        font-weight: bold;
        padding: 0.75rem 0.75rem;
        border: none;
        border-radius: 12px;
        background-color: #11442a;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s ease-out;
      }
      .login-footer a {
        color: #11442a;
        text-decoration: none;
        font-weight: bold;
      }
      .login-footer a:hover {
        text-decoration: underline;
      }
      .login-footer p {
        font-size: 1rem;
        color: #333;
        font-family: "Inter", "Roboto", "Open Sans", sans-serif;
      }
      .login-info input:not(:placeholder-shown):invalid:t {
        border-color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="image-section">
        <img
          src="assets/images/halie-west-25xggax4bSA-unsplash.jpg"
          alt="Odin Project background"
        />
        <div class="logo-container">
          <img src="assets/images/odin-lined.png" alt="Odin Project logo" />
          <h1>Odin</h1>
        </div>
        <div class="footer-copyright">
          <p
            style="
              color: rgb(226, 221, 221);
              text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
            "
          >
            &copy; 2024 Odin Project. All rights reserved.
          </p>
        </div>
      </div>
      <div class="login-section">
        <div class="login-box">
          <div class="login-header">
            <p>
              This is not a real online service! You know you need something
              like this in your life to help you realize your deepest dreams.
              Sign up now to get started.
            </p>
            <p>You know you want to.</p>
          </div>
          <div class="login-info">
            <p>Let's do this</p>
            <form>
              <input type="text" placeholder="FIRST NAME" required />
              <input type="text" placeholder="LAST NAME" required />
              <input type="email" placeholder="EMAIL" required />
              <input type="number" placeholder="PHONE NUMBER" required />
              <input type="password" placeholder="PASSWORD" required />
              <input type="password" placeholder="CONFIRM PASSWORD" required />
            </form>
          </div>

          <div class="login-footer">
            <button>create account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
